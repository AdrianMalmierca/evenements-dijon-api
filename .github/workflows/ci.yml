name: CI — Dijon Events Backend

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dijonevents_test
          POSTGRES_USER: dijon
          POSTGRES_PASSWORD: dijon
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon
        env:
          DB_USERNAME: dijon
          DB_PASSWORD: dijon
          JWT_SECRET: test-secret-key-only-for-ci-min-32-chars
          OPENAGENDA_API_KEY: test_key
          OPENAGENDA_DIJON_UID: test_uid

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          DB_USERNAME: dijon
          DB_PASSWORD: dijon
          JWT_SECRET: test-secret-key-only-for-ci-min-32-chars
          OPENAGENDA_API_KEY: test_key
          OPENAGENDA_DIJON_UID: test_uid
